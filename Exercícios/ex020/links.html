<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: blueviolet;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color: rgb(20, 102, 24);
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: rgb(218, 218, 29);
        }
 
        .especial::after{
            content: '⭠';
            
        }

        .especial::before{
            content: '⭢'
        }

        .especial{
            background-color: rgb(89, 245, 69);
        }
    </style>
</head>
<body>
    <h1>Personalizando links.</h1>
    <ul>
        <li><a target="_blank" href="https://github.com/gustavoguanabara/html-css/tree/master/aulas-pdf">Repositório do Github</a></li>
        <li><a target="_blank" href="https://www.youtube.com/@cursoemvideo"  class="especial">Canal do Youtube</a></li>
        <li><a target="_blank" href="https://www.cursoemvideo.com">Site do Curso em Video</a></li>
    </ul>
    
</body>
</html>
