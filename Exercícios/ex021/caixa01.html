<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: rgb(125, 136, 230);
            height: 300px;
            width: 300px;
            border: 10px solid rgb(56, 65, 75) ;
           
            

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed blueviolet;
        }

        a{
            border: 6px dashed black;
        }

        p{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-Level</h1>
    <p>Parágrafos também são exemplos de Box-Level, mas os <a href="#">links são exemplo de Inline-Level</a>. </p>
    
</body>
</html>
